name: Build & publish extensions repo

# Audited, SHA-pinned build -> sign -> index -> publish flow.
# Every action is pinned to a commit SHA (not a tag) per EXTENSIONS_REPO_STARTER.md
# §6.6 ("Pin every GitHub Action to a commit SHA, not a tag"). The SHAs below are the
# ones audited in SIGNING_RUNBOOK.md §4 (resolved against github.com on 2026-05-29):
#   actions/checkout            v6.0.2  de0fac2e4500dabe0009e67214ff5f5447ce83dd
#   actions/setup-java          v5.2.0  be666c2fcd27ec809703dec50e508c2fdc7f6654
#   gradle/actions/setup-gradle v6.1.0  50e97c2cd7a37755bbfafc9c5b7cafaece252f6e
#   peaceiris/actions-gh-pages  v4.1.0  84c30a85c19949d7eee79c4ff27748b70285e453

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write   # least privilege: only enough to push the generated 'repo' branch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source (main)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e  # v6.1.0

      # ---- Reconstruct the signing keystore from the base64 CI secret ----
      - name: Decode signing keystore
        env:
          KEYSTORE_B64: ${{ secrets.SIGNING_KEYSTORE_B64 }}
        run: printf '%s' "$KEYSTORE_B64" | base64 -d > "$RUNNER_TEMP/ci.keystore"

      # ---- Build & sign all source APKs (build-from-source ONLY; never accept prebuilt APKs) ----
      # Maps the SIGNING_* secrets to the CI_* env vars common.gradle:48-51 reads.
      - name: Assemble release APKs
        env:
          CI_KEYSTORE_PATH: ${{ runner.temp }}/ci.keystore
          CI_KEYSTORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          CI_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          CI_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: ./gradlew assembleRelease --stacktrace

      # ---- Collect built APKs into repo/apk (the dir the app serves as $repoUrl/apk/<apk>) ----
      - name: Collect APKs
        run: |
          mkdir -p repo/apk repo/icon
          find . -path '*/build/outputs/apk/release/*.apk' -exec cp {} repo/apk/ \;

      # ---- Extract each APK's launcher icon -> repo/icon/<pkg>.png ----
      # The app fetches icons from "$repoUrl/icon/<pkg>.png" (MangaExtensionApi.kt:129).
      # Runs after APKs are assembled/collected and before index generation. aapt2 comes
      # from the SDK build-tools; install-android-sdk action isn't pinned, so we use the
      # build-tools that setup-gradle / the Android image already provides via ANDROID_HOME.
      # Pillow enables WEBP->PNG conversion for the rare WEBP-only launcher icon.
      - name: Extract icons
        run: |
          pip install --quiet Pillow
          python3 tools/extract_icons.py repo/apk repo/icon

      # ---- Compute the signing-cert SHA-256 fingerprint (== repo.json value) ----
      # lowercase, no colons — matches the loader's Hash.sha256 of the signing cert
      # (MangaExtensionLoader.kt:408-422; trust check TrustMangaExtension.kt:14-18).
      - name: Compute signing fingerprint
        id: fp
        env:
          CI_KEYSTORE_PATH: ${{ runner.temp }}/ci.keystore
          CI_KEYSTORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          CI_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
        run: |
          FP=$(keytool -list -v -keystore "$CI_KEYSTORE_PATH" \
                -alias "$CI_KEY_ALIAS" -storepass "$CI_KEYSTORE_PASSWORD" \
              | grep -A1 'SHA256:' | grep -oE '([0-9A-F]{2}:){31}[0-9A-F]{2}' \
              | tr -d ':' | tr 'A-F' 'a-f' | head -n1)
          echo "fingerprint=$FP" >> "$GITHUB_OUTPUT"
          echo "Signing fingerprint: $FP"

      # ---- Generate index.min.json (+ index.json) and repo.json with the live fingerprint ----
      - name: Generate repo index
        env:
          SIGNING_FINGERPRINT: ${{ steps.fp.outputs.fingerprint }}
        run: |
          python3 tools/create_repo.py repo/apk repo/index.json repo/index.min.json
          sed "s/REPLACE_WITH_LOWERCASE_SHA256_OF_YOUR_SIGNING_CERT/${SIGNING_FINGERPRINT}/" \
            repo.json.template > repo/repo.json

      # ---- Publish artifacts to the orphan 'repo' branch ----
      - name: Publish to 'repo' branch
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453  # v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./repo
          publish_branch: repo
          force_orphan: true
